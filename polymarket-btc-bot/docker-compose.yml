version: "3.8"

services:
  polybot:
    build: .
    container_name: polybot
    restart: always
    env_file: .env
    volumes:
      # Persistir logs en el host para facilitar depuración
      - ./logs:/app/logs
    # Límites de recursos para evitar consumo excesivo en VPS
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    # Healthcheck básico: verifica que el proceso Python está corriendo
    healthcheck:
      test: ["CMD", "pgrep", "-f", "python main.py"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
